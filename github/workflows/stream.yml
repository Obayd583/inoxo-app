name: System Environment Config

on:
  repository_dispatch:
    types: [start_stream]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Initialize Core
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg
    - name: Sync Environment Data
      run: |
        ffmpeg -user_agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" -headers "Referer: https://google.com/" -re -i "${{ github.event.client_payload.stream_url }}" -c copy -f flv "${{ github.event.client_payload.fb_url }}"
